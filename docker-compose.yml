services:
  # 1. Kontener bazy danych MySQL
  meow_db:
    image: mysql:8.0.30
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wypozyczalnia_ksiazek
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - meow_network

  # 2. Kontener aplikacji .NET
  meow_app:
    image: meow_web_app
    container_name: meow-app-container
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - Qdrant__Host=meow_vector_db
      - ConnectionStrings__DefaultConnection=server=meow_db;port=3306;database=wypozyczalnia_ksiazek;user=root;password=rootpassword;
      - ConnectionStrings__Redis=meow_redis:6379
      - Smtp__Host=meow_mailpit
      - Smtp__Port=1025
      - Smtp__UseSsl=false
      - Smtp__From=noreply@meow.pl
      - Smtp__FromName=meow E-Księgarnia
    volumes:
      - ./data-protection-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      - meow_db
      - meow_redis
      - meow_mailpit
    networks:
      - meow_network

  # 3. Redis (cache)
  meow_redis:
    image: redis:7-alpine
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"
    networks:
      - meow_network

  # 4. Kontener bazy danych Qdrant
  meow_vector_db:
    image: qdrant/qdrant:latest
    container_name: qdrant-container
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - meow_network

  # 5. Mailpit — lokalny SMTP + podgląd maili (http://localhost:8025)
  meow_mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit-container
    restart: always
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - meow_network

volumes:
  mysql_data:
  qdrant_data:

networks:
  meow_network:
    driver: bridge